version: '3.8'

services:
  coturn:
    image: coturn/coturn:4.6-alpine
    container_name: coturn
    ports:
      ## Web-admin
      - "8080:8080"
      ## STUN/TURN
      - "3478:3478"
      - "3478:3478/udp"
      - "3479:3479"
      - "3479:3479/udp"
      - "80:80"
      - "80:80/udp"
      ## STUN/TURN SSL
      - "5349:5349"
      - "5349:5349/udp"
      - "5350:5350"
      - "5350:5350/udp"
      - "443:443"
      - "443:443/udp"
      # Relay Ports
      - "49152-65535:49152-65535"
      - "49152-65535:49152-65535/udp"
    volumes:
      - ./config/turnserver.conf:/etc/turnserver.conf
      - ./config/openssl/privkey.pem:/etc/ssl/private/privkey.pem
      - ./config/openssl/cert.pem:/etc/ssl/certs/cert.pem
    depends_on:
      - mysql
    network_mode: host

  mysql:
    image: bitnami/mysql:8.2
    container_name: mysql
    ports:
      - '3306:3306'
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - MYSQL_USER=coturn
      - MYSQL_PASSWORD=admin
      - MYSQL_DATABASE=coturn
    networks:
      - localnet

networks:
  localnet:
    driver: bridge
