version: '3.8'

services:
  #######################
  # CACHE
  #######################

  redis:
    extends:
      file: docker-compose.util.yml
      service: redis

  #######################
  # STORAGE
  #######################

  minio:
    extends:
      file: docker-compose.util.yml
      service: minio

  #######################
  # BROKER
  #######################

  emqx:
    extends:
      file: docker-compose.brk.yml
      service: emqx

  mqttx:
    extends:
      file: docker-compose.brk.yml
      service: mqttx

  zookeeper:
    extends:
      file: docker-compose.brk.yml
      service: zookeeper

  kafka:
    extends:
      file: docker-compose.brk.yml
      service: kafka

  connect:
    extends:
      file: docker-compose.brk.yml
      service: connect

  #######################
  # MONGO-RS
  #######################

  mongodb-primary:
    extends:
      file: mongo-rs/docker-compose.yml
      service: mongodb-primary

  mongodb-secondary:
    extends:
      file: mongo-rs/docker-compose.yml
      service: mongodb-secondary

  mongodb-arbiter:
    extends:
      file: mongo-rs/docker-compose.yml
      service: mongodb-arbiter

networks:
  localnet:
    driver: bridge
