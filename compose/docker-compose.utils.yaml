version: '3.8'

services:
  mongo:
    image: bitnami/mongodb:6.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=
      - MONGO_INITDB_ROOT_PASSWORD=
    networks:
      - platform

  redis:
    image: bitnami/redis:7.0
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=
    networks:
      - platform

  minio:
    image: bitnami/minio:2023.4.20
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=
      - MINIO_ROOT_PASSWORD=
    networks:
      - platform

  zookeeper:
    image: 'bitnami/zookeeper:3.8'
    ports:
      - '2181:2181'
    environment:
      - ZOO_ENABLE_AUTH=
      - ZOO_CLIENT_USER=
      - ZOO_CLIENT_PASSWORD=
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - platform

  kafka:
    image: 'bitnami/kafka:3.4'
    ports:
      - "9092:9092"
    environment:
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_ENABLE_KRAFT=no
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
    depends_on:
      - zookeeper
    networks:
      - platform

  cassandra:
    image: 'bitnami/cassandra:4.1'
    ports:
      - '9042:9042'
    environment:
      - CASSANDRA_PASSWORD=
      - CASSANDRA_USERNAME=
      - CASSANDRA_PASSWORD_SEEDER=
    networks:
      - platform

networks:
  platform:
